<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>ZoomBird</title>
<script>
var ua = navigator.userAgent;
var w = Math.min(screen.width, screen.height);
// Phone: small screen + touch UA. Tablets and desktops go to desktop version.
var isPhone = (
  /iPhone|iPod/i.test(ua) ||
  (/Android/i.test(ua) && /Mobile/i.test(ua)) ||
  (/Android/i.test(ua) && w < 600)
);
// Safety: if screen is wide (tablet/desktop), never go mobile
if (w >= 768) isPhone = false;
var target = isPhone ? 'mobile.html' : 'desktop.html';
window.location.replace(target);
</script>
<noscript><meta http-equiv="refresh" content="0;url=desktop.html"></noscript>
</head>
<body style="background:#0a0e14;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh">
<a id="fb" style="font-size:1.2em;color:#a4d645;text-decoration:underline">Loading...</a>
<script>document.getElementById('fb').href=target;document.getElementById('fb').textContent='Click here if not redirected';</script>
</body>
</html>
